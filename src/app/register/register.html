<div class="register-container">
  <div class="register-card">
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Regístrate para comenzar a comprar</p>

    @if (error()) {
      <div class="alert error">{{ error() }}</div>
    }

    @if (success()) {
      <div class="alert success">Usuario registrado exitosamente. Por favor, inicia sesión.</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Nombre de usuario</label>
        <input
          type="text"
          id="username"
          [ngModel]="username()"
          name="username"
          (ngModelChange)="username.set($event)"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          [ngModel]="email()"
          name="email"
          (ngModelChange)="email.set($event)"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [ngModel]="password()"
          name="password"
          (ngModelChange)="password.set($event)"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          [ngModel]="confirmPassword()"
          name="confirmPassword"
          (ngModelChange)="confirmPassword.set($event)"
          required
        />
      </div>

      <button type="submit" class="btn-register" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a></p>
  </div>
</div>
