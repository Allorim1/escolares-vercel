<div class="marcas-container">
  <h2 class="page-title reveal-init" #revealElement>Marcas</h2>

  <div class="marcas-grid">
    @for (marca of marcas(); track marca.id; let i = $index) {
      <a
        [routerLink]="['/products/collection', marca.name]"
        class="marca-card reveal-init"
        #revealElement
        [style.transition-delay.ms]="i * 100"
      >
        @if (marca.image) {
          <img [src]="marca.image" [alt]="marca.name" class="marca-image" />
        } @else {
          <div class="marca-placeholder">{{ marca.name.charAt(0) }}</div>
        }
        <span class="marca-name">{{ marca.name }}</span>
      </a>
    } @empty {
      <div class="empty reveal-init" #revealElement>No hay marcas registradas.</div>
    }
  </div>
</div>
