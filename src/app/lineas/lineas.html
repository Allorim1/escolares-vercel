<div class="lineas-container">
  <h1 class="page-title reveal-init" #revealElement>Nuestras Líneas</h1>

  <div class="lineas-grid">
    @for (linea of lineas; track linea.name; let i = $index) {
      <div class="linea-card reveal-init" #revealElement [style.transition-delay.ms]="i * 100">
        <img [src]="linea.image" [alt]="linea.name" class="linea-image" />
        <p class="linea-name">{{ linea.name }}</p>
      </div>
    }
  </div>
</div>
