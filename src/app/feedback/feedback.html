<div class="feedback-container">
  <h1 class="page-title reveal-init" #revealElement>Contáctanos</h1>

  <div class="newsletter">
    <div class="contact-form reveal-init" #revealElement>
      <h2>Envíanos tus comentarios</h2>
      <p>Tu opinión nos importa. Escríbenos.</p>
      <form>
        <input type="text" placeholder="Tu nombre" />
        <input type="email" placeholder="Tu correo" />
        <input type="text" placeholder="Tu telefono" />
        <textarea placeholder="Tu mensaje" rows="5"></textarea>
        <button type="submit">Enviar</button>
      </form>
    </div>
  </div>
</div>
