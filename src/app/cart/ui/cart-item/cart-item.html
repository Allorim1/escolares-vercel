<div class="cart-item">
  <img
    [src]="productCartItem().product.image"
    [alt]="productCartItem().product.title"
    class="item-image"
  />

  <div class="item-details">
    <h4 class="item-title">{{ productCartItem().product.title }}</h4>
    <p class="item-price">{{ productCartItem().product.price | currency }}</p>
  </div>

  <div class="item-quantity">
    <button
      class="qty-btn"
      (click)="onDecrease.emit(productCartItem())"
      [disabled]="productCartItem().quantity <= 1"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M5 12h14" />
      </svg>
    </button>
    <span class="qty-value">{{ productCartItem().quantity }}</span>
    <button class="qty-btn" (click)="onIncrease.emit(productCartItem())">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M12 5v14M5 12h14" />
      </svg>
    </button>
  </div>

  <div class="item-subtotal">
    <span>{{ productCartItem().product.price * productCartItem().quantity | currency }}</span>
  </div>

  <button class="remove-btn" (click)="onRemove.emit(productCartItem().product.id)" title="Eliminar">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="M18 6L6 18M6 6l12 12" />
    </svg>
  </button>
</div>
